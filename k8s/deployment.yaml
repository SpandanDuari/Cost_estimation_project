apiVersion: apps/v1
kind: Deployment
metadata:
  name: cost-estimation-app
  namespace: default
  labels:
    app: cost-estimation

spec:
  replicas: 2

  selector:
    matchLabels:
      app: cost-estimation

  template:
    metadata:
      labels:
        app: cost-estimation

    spec:
      containers:
      - name: cost-estimation
        image: 974387521388.dkr.ecr.ap-south-1.amazonaws.com/devopsproject:latest
        imagePullPolicy: IfNotPresent

        ports:
        - containerPort: 5000
          name: http
          protocol: TCP

        env:
        - name: FLASK_ENV
          value: "production"

        # Resource requests and limits
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        
        # Liveness probe
        livenessProbe:
          httpGet:
            path: /
            port: 5000
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        
        # Readiness probe
        readinessProbe:
          httpGet:
            path: /
            port: 5000
          initialDelaySeconds: 10
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 2

      restartPolicy: Always
