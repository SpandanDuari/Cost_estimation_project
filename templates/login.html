<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login | Cost Estimation Portal</title>
    <style>
        body {
            font-family: "Segoe UI", Arial, sans-serif;
            background: linear-gradient(135deg, #eff6ff, #eef2ff);
            margin: 0;
            min-height: 100vh;
            display: grid;
            place-items: center;
        }
        .card {
            width: min(460px, 92vw);
            background: #ffffff;
            border-radius: 14px;
            box-shadow: 0 12px 30px rgba(30, 41, 59, 0.15);
            padding: 26px;
        }
        h1 {
            margin: 0;
            text-align: center;
            color: #0f172a;
            font-size: 24px;
        }
        .subtitle {
            margin: 8px 0 18px;
            text-align: center;
            color: #475569;
            font-size: 14px;
        }
        label {
            font-weight: 600;
            display: block;
            margin-top: 10px;
            color: #1e293b;
        }
        input,
        button,
        .link-btn {
            width: 100%;
            padding: 10px;
            margin: 8px 0;
            font-size: 15px;
            box-sizing: border-box;
            border-radius: 8px;
        }
        input {
            border: 1px solid #cbd5e1;
            outline: none;
        }
        input:focus {
            border-color: #2563eb;
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.15);
        }
        button {
            background: #2563eb;
            color: white;
            border: none;
            cursor: pointer;
            font-weight: 600;
        }
        button:hover {
            background: #1e40af;
        }
        .link-btn {
            display: inline-block;
            text-align: center;
            text-decoration: none;
            background: #0f766e;
            color: #ffffff;
            font-weight: 600;
        }
        .link-btn:hover {
            background: #0f5f58;
        }
        .error {
            background: #fef2f2;
            color: #b91c1c;
            padding: 10px;
            margin-bottom: 10px;
            border-radius: 8px;
            font-size: 14px;
        }
    </style>
</head>
<body>

<div class="card">
    <h1>Cost Estimation Portal</h1>
    <p class="subtitle">Login with your existing account</p>

    {% if error %}
    <div class="error">{{ error }}</div>
    {% endif %}

    <form method="POST" action="{{ url_for('auth') }}" autocomplete="on">
        <label>Username</label>
        <input type="text" name="username" autocomplete="username" required>

        <label>Password</label>
        <input type="password" name="password" autocomplete="current-password" required>

        <button type="submit">Login</button>
    </form>

    <a class="link-btn" href="{{ url_for('signup') }}">Create New Account</a>
</div>

</body>
</html>
