<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Automated Cost Estimation</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f2f4f8;
            padding: 40px;
        }
        .box {
            background: white;
            padding: 25px;
            width: 420px;
            margin: auto;
            border-radius: 10px;
            box-shadow: 0 0 10px #ccc;
        }
        h2 {
            text-align: center;
        }
        label {
            font-weight: bold;
        }
        input, button {
            width: 100%;
            padding: 10px;
            margin: 8px 0;
            font-size: 16px;
        }
        button {
            background: #2563eb;
            color: white;
            border: none;
            cursor: pointer;
            border-radius: 5px;
        }
        button:hover {
            background: #1e40af;
        }
        .result {
            background: #e6fffa;
            padding: 10px;
            margin-top: 15px;
            border-radius: 5px;
        }
        .error {
            background: #ffe6e6;
            color: red;
            padding: 10px;
            margin-top: 10px;
            border-radius: 5px;
        }
        .hint {
            font-size: 12px;
            color: #555;
        }
    </style>
</head>
<body>

<div class="box">
    <h2>Software Cost Estimation</h2>

    <form method="POST">
        <label>Project Size (Lines of Code - LOC)</label>
        <input type="number" name="loc" placeholder="Eg: 10000" required>
        <div class="hint">Enter total number of lines of code</div>

        <label>Cost per Developer (₹ per month)</label>
        <input type="number" name="cost" placeholder="Eg: 20000" required>
        <div class="hint">Monthly cost of one developer</div>

        <button type="submit">Estimate Cost</button>
    </form>

    {% if error %}
    <div class="error">{{ error }}</div>
    {% endif %}

    {% if result %}
    <div class="result">
        <p><b>Effort:</b> {{ result.effort }} Person/Months</p>
        <p><b>Development Time:</b> {{ result.time }} Months</p>
        <p><b>Total Cost:</b> ₹ {{ result.cost }}</p>
    </div>
    {% endif %}
</div>

</body>
</html>
